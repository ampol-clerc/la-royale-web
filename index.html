<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Royale by Bernard Clerc</title>

    <!-- Playfair Display - Headline -->
    <!-- Urbanist - Body & Navigation -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Get Bootstrap - Grid 12 Columns -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/nav.css" />
    <link rel="stylesheet" href="./assets/css/hero.css" />
  </head>

  <body>
    <!-- Top - Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
      <div class="container d-flex justify-content-between">
        <a class="navbar-brand brand-logo" href="##">LA ROYALE</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-center"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link px-3" href="##">THE EXPERIENCE</a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-3" href="##">EXCLUSIVES</a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-3" href="##">RESERVATIONS</a>
            </li>
          </ul>
        </div>

        <div class="navbar-btn-wrapper d-none d-lg-block">
          <a class="btn btn-outline-gold nav-btn" href="##">SECURE ACCESS</a>
        </div>
      </div>
    </nav>

    <!-- Main - Hero Section -->
    <header class="hero-section">
      <div class="container hero-container text-center">
        <div class="row justify-content-center">
          <div class="col-lg-8 hero-content-stack">
            <div class="hero-logo-wrapper mb-4">
              <img src="##" alt="La Royale Logo" class="hero-monogram" />
            </div>

            <h1 class="hero-title mb-4">WHERE LUXURY MEETS THE NIGHT</h1>

            <div class="hero-btn-wrapper">
              <a class="btn btn-gold" href="##">SECURE YOUR ACCESS</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Get Bootstrap - JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
